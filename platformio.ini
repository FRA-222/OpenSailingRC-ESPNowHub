; PlatformIO Project Configuration File
; OpenSailingRC-ESPNowHub — ESP-NOW Relay Hub
;
; Basé sur M5Stack PowerHub (CoreS3 / ESP32-S3)
; Relai transparent ESP-NOW pour étendre la portée de l'écosystème OpenSailingRC

[env:m5stack-cores3]
platform = espressif32@6.5.0
board = m5stack-cores3
framework = arduino

monitor_speed = 115200
upload_speed = 1500000

lib_deps = 
    m5stack/M5Unified@^0.2.2

build_flags = 
    -DCORE_DEBUG_LEVEL=3
    ; Hub relay configuration
    -DHUB_RELAY_DELAY_US=3000
    -DHUB_STATUS_INTERVAL_MS=5000
    -DHUB_RELAY_QUEUE_SIZE=20
